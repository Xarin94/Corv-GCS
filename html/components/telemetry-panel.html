<!-- Telemetry Panel - Raw Data Display -->
<div id="telemetry-panel" class="floating-panel">
    <div class="panel-header">RAW DATA STREAM</div>
    <div class="telem-section">
        <div class="telem-row">
            <span class="t-lbl">ROLL</span>
            <span class="t-val" id="t-roll">0.00°</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">PITCH</span>
            <span class="t-val" id="t-pitch">0.00°</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">YAW</span>
            <span class="t-val" id="t-yaw">000°</span>
        </div>
    </div>
    <div class="telem-section">
        <div class="telem-row">
            <span class="t-lbl">LAT</span>
            <span class="t-val" id="t-lat">00.000000</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">LON</span>
            <span class="t-val" id="t-lon">00.000000</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">ALT</span>
            <span class="t-val" id="t-alt">0000.0 m</span>
        </div>
    </div>
    <div class="telem-section">
        <div class="telem-row">
            <span class="t-lbl">IAS</span>
            <span class="t-val" id="t-as">0.0 m/s</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">GS</span>
            <span class="t-val" id="t-gs">0.0 m/s</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">VS</span>
            <span class="t-val" id="t-vs">0.0 m/s</span>
        </div>
    </div>
    <div class="telem-section" style="border:none;">
        <div class="telem-row">
            <span class="t-lbl">ACC X</span>
            <span class="t-val" id="t-ax">0.00 g</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">ACC Y</span>
            <span class="t-val" id="t-ay">0.00 g</span>
        </div>
        <div class="telem-row">
            <span class="t-lbl">ACC Z</span>
            <span class="t-val" id="t-az">0.00 g</span>
        </div>
    </div>
</div>
