<!-- Header with Controls -->
<div class="header">
    <div class="brand">CORV <span>SYSTEMS</span></div>
    <div class="controls">
        <span id="fps-counter" style="font-family: var(--font-data); font-size: 11px; color: var(--accent-cyan); padding: 8px 10px; opacity: 0.7;">-- FPS</span>
        <button id="btn-mode" class="ui-btn square mode-toggle" onclick="toggleViewMode()" title="Split view" aria-label="Split view">
            <svg class="icon-split" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none">
                <path d="M4 5h7v14H4V5zm9 0h7v14h-7V5z" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg class="icon-fullscreen" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none">
                <path d="M7 3H3v4M17 3h4v4M7 21H3v-4M17 21h4v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <button id="btn-sat" class="ui-btn square" onclick="toggleSatellite()" title="Satellite overlay">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                <path d="M3 6.5L9 4l6 2 6-2v13l-6 2-6-2-6 2v-13z" fill="currentColor"/>
            </svg>
        </button>
        <button id="btn-sun" class="ui-btn square active" onclick="toggleSunlight()" title="Toggle realistic sunlight">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                <circle cx="12" cy="12" r="5" fill="currentColor"/>
                <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <button id="btn-cam" class="ui-btn square" onclick="toggleCameraMode()" title="Toggle 1st/3rd person camera">1P</button>
        <button id="btn-traj" class="ui-btn square" onclick="toggleTrajectory()" title="Predicted trajectory corridor">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                <path d="M12 3v6M8 5l4-2 4 2M7 21c1-6 4-9 5-12M17 21c-1-6-4-9-5-12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button id="btn-more" class="ui-btn square" type="button" title="Menu" aria-haspopup="true" aria-expanded="false" aria-label="Menu">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none">
                <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div id="more-menu" class="more-menu" aria-label="Menu">
            <button id="btn-telem" class="ui-btn" onclick="toggleTelemetry()">RAW DATA</button>
            <button id="btn-link" class="ui-btn" onclick="connectSerial()">CONNECT LINK</button>
            <button id="btn-rec" class="ui-btn" onclick="toggleRecording()">REC</button>
            <button id="btn-scan" class="ui-btn red-hover" onclick="fetchRunways()">SCAN RUNWAYS</button>
            <button id="btn-dl-traffic" class="ui-btn" onclick="downloadTraffic()">DL TRAFFIC</button>
            <button id="btn-cfg" class="ui-btn" onclick="toggleConfig()">CONFIG</button>
        </div>
    </div>
</div>
