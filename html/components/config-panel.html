<!-- Configuration Panel -->
<div id="config-panel" class="floating-panel">
    <div class="panel-header">SYSTEM CONFIG</div>
    <div class="cfg-row">
        <label>ALTITUDE OFFSET (M)</label>
        <input type="number" id="inp-offset" value="0" onchange="updateOffset(this.value)">
    </div>
    <div class="cfg-row">
        <label>TERRAIN (HGT FOLDER)</label>
        <label for="hgt-input" class="file-upload-btn">SELECT HGT FOLDER</label>
        <input type="file" id="hgt-input" webkitdirectory directory multiple style="display:none;">
        <div id="status-msg" style="font-size:10px; color:#666; margin-top:5px; text-align:right;">NO DATA</div>
    </div>
    <div class="cfg-row">
        <label>TIME OF DAY (DEBUG): <span id="time-display">12:00</span></label>
        <input type="range" id="time-slider" min="0" max="1440" value="720" step="1" style="width:100%;">
    </div>

    <div class="cfg-row" id="map-brightness-row" style="display:none;">
        <label>MAP BRIGHTNESS (STATIC): <span id="map-brightness-display">0.85</span></label>
        <input type="range" id="map-brightness-slider" min="0.3" max="1.6" value="0.85" step="0.01" style="width:100%;">
    </div>

    <div class="cfg-row">
        <label>DEVTOOLS</label>
        <button id="btn-devtools" class="file-upload-btn" type="button" onclick="openDevTools()">OPEN DEVTOOLS</button>
    </div>
</div>
