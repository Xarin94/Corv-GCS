<!-- Loading Overlay with Animated Plane -->
<div id="loading-overlay" class="visible">
    <div class="scene-container">

        <div class="cloud-layer-back">
            <div class="cloud" style="width:200px; height:60px; top:20%; left:100%; animation-duration:15s;"></div>
            <div class="cloud" style="width:120px; height:40px; top:60%; left:100%; animation-duration:10s; opacity:0.6;"></div>
            <div class="cloud" style="width:300px; height:80px; top:80%; left:100%; animation-duration:20s; opacity:0.4;"></div>
        </div>

        <div class="speed-lines">
            <div class="speed-line" style="top:10%; width:200px; left:100%; animation-delay:0.1s;"></div>
            <div class="speed-line" style="top:30%; width:100px; left:100%; animation-delay:0.5s;"></div>
            <div class="speed-line" style="top:70%; width:300px; left:100%; animation-delay:0.2s;"></div>
            <div class="speed-line" style="top:90%; width:150px; left:100%; animation-delay:0.8s;"></div>
        </div>

        <div class="plane-rig">
            <div class="plane-chassis">

                <div class="wing-back"></div>

                <div class="tail-group">
                    <div class="tail-fin"></div>
                </div>

                <div class="exhaust">
                    <div class="pipe"></div>
                    <div class="pipe"></div>
                    <div class="smoke-particle" style="animation-delay: 0s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.2s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.4s;"></div>
                </div>

                <div class="fuselage">
                    <div class="stripe"></div>
                    <div class="rivets"></div>
                </div>

                <div class="cockpit-area">
                    <div class="pilot"></div>
                    <div class="canopy"></div>
                </div>

                <div class="engine-nose"></div>

                <div class="wing-front">
                    <div class="nav-light"></div>
                </div>

                <div class="propeller-complex">
                    <div class="prop-blur-disk"></div>
                    <div class="prop-blades">
                        <div class="blade"></div>
                        <div class="blade"></div>
                    </div>
                    <div class="spinner-cone"></div>
                </div>

            </div>
        </div>

        <div class="loading-hud">
            <div class="loading-bar-frame">
                <div class="loading-bar-fill"></div>
            </div>
            <div class="loading-msg">LOADING...</div>
        </div>

    </div>
</div>
