<!-- Plotly Container - Live Charts for Split View -->
<div id="plotly-container">
    <div id="plotly-controls">
        <span class="traces-label">TRACES:</span>
        <label><input type="checkbox" data-field="as" checked> IAS</label>
        <label><input type="checkbox" data-field="gs"> GS</label>
        <label><input type="checkbox" data-field="vs"> VS</label>
        <label><input type="checkbox" data-field="rawAlt" checked> ALT</label>
        <label><input type="checkbox" data-field="roll"> ROLL</label>
        <label><input type="checkbox" data-field="pitch"> PITCH</label>
        <label><input type="checkbox" data-field="az" checked> G-LOAD</label>
    </div>
    <div id="plotly-chart"></div>
</div>
