<!-- Custom Title Bar (hover to show) -->
<div id="title-bar-zone">
    <div id="title-bar">
        <div class="title-bar-drag"></div>
        <div class="title-bar-buttons">
            <button class="title-btn" id="btn-minimize" onclick="window.windowControls.minimize()">
                <svg viewBox="0 0 12 12"><rect y="5" width="12" height="2"/></svg>
            </button>
            <button class="title-btn" id="btn-maximize" onclick="window.windowControls.maximize()">
                <svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="title-btn close" id="btn-close" onclick="window.windowControls.close()">
                <svg viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="2"/></svg>
            </button>
        </div>
    </div>
</div>
